<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>横スクロール弾避け</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

canvas {
  border: 2px solid white;
  background: black;
}
</style>
</head>

<body>

<canvas id="game" width="800" height="450"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");


// ====================
// 背景画像
// ====================

const bg1 = new Image();
const bg2 = new Image();

bg1.src = "background1.png";
bg2.src = "background2.png";

const backgrounds = [
  { img: bg1, x: 0 },
  { img: bg2, x: canvas.width }
];

const bgSpeed = 2;


// ====================
// プレイヤー
// ====================

const playerImg = new Image();
playerImg.src = "player.png";

const player = {
  x: 100,
  y: 200,
  w: 120,
  h: 120,

  speed: 5,
  normalSpeed: 5,
  boostSpeed: 10,

  damage: 0,
  invincible: 0,

  spin: false,
  spinTimer: 0,
  rotation: 0
};


// ====================
// ゲーム変数
// ====================

let bullets = [];
let keys = {};
let score = 0;
let gameOver = false;
let frame = 0;


// ====================
// 入力
// ====================

document.addEventListener("keydown", e => {

  keys[e.key] = true;

  if (
    e.code === "Space" &&
    !e.repeat &&
    !player.spin &&
    !gameOver
  ) {
  
    player.spin = true;
    player.spinTimer = 0;
  
    player.speed = player.boostSpeed;
  
  }

  if (gameOver && e.key === "Enter") {
    resetGame();
  }

});
document.addEventListener("keyup", e => {
  keys[e.key] = false;
});


// ====================
// リセット
// ====================

function resetGame() {

  player.x = 100;
  player.y = 200;
  player.damage = 0;
  player.invincible = 0;

  player.spin = false;
  player.spinTimer = 0;
  player.rotation = 0;
  player.speed = player.normalSpeed;

  bullets = [];

  backgrounds[0].x = 0;
  backgrounds[1].x = canvas.width;

  score = 0;
  frame = 0;
  gameOver = false;
}


// ====================
// 弾生成
// ====================

function spawnBullet() {

  bullets.push({
    x: canvas.width,
    y: Math.random() * (canvas.height - 20),
    w: 20,
    h: 20,
    speed: 6
  });

}


// ====================
// 当たり判定
// ====================

function hit(a, b) {

  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );

}


// ====================
// 更新
// ====================

function update() {

  if (gameOver) return;

  frame++;

  // スピン中処理
  if (player.spin) {
  
    player.spinTimer++;
  
    const spinTotal = 30;
    const overshootEnd = 22;
  
    if (player.spinTimer <= overshootEnd) {
      // 0 → 390度まで右回転
      const t = player.spinTimer / overshootEnd;
      player.rotation = 390 * t;
    } else {
      // 390 → 360度へ少し戻る
      const t = (player.spinTimer - overshootEnd) / (spinTotal - overshootEnd);
      player.rotation = 390 - 30 * t;
    }
  
    if (player.spinTimer >= spinTotal) {
      player.spin = false;
      player.spinTimer = 0;
      player.rotation = 0;
      player.speed = player.normalSpeed;
    }
  
  }

  // プレイヤー移動

  if (keys["ArrowUp"]) player.y -= player.speed;
  if (keys["ArrowDown"]) player.y += player.speed;
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;


  // 画面外制限

  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));


  // 背景スクロール

  backgrounds.forEach(bg => {
    bg.x -= bgSpeed;
  });

  backgrounds.forEach(bg => {

    if (bg.x <= -canvas.width) {

      let maxX = Math.max(...backgrounds.map(b => b.x));

      bg.x = maxX + canvas.width;
    }

  });


  // スコア

  score += 1;

  // 難易度上昇
  let difficulty = Math.floor(score / 600);
  
  // 弾の発生間隔。数字が小さいほど多く出る
  let bulletInterval = Math.max(15, 45 - difficulty * 3);
  
  // 一度に出る弾の数
  let bulletCount = 1 + Math.floor(difficulty / 4);
  
  // 弾生成
  if (frame % bulletInterval === 0) {
    for (let i = 0; i < bulletCount; i++) {
      spawnBullet();
    }
  }


  // 弾移動

  bullets.forEach(b => {
    b.x -= b.speed;
  });

  bullets = bullets.filter(b => b.x + b.w > 0);


  // 無敵時間

  if (player.invincible > 0) {
    player.invincible--;
  }


  // 当たり判定

  bullets.forEach((b, i) => {

    if (
      hit(player, b) &&
      player.invincible <= 0 &&
      !player.spin
    ) {

      bullets.splice(i, 1);

      player.damage++;
      player.invincible = 60;

      if (player.damage >= 3) {
        gameOver = true;
      }

    }

  });

}


// ====================
// 描画
// ====================

function draw() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);


  // 背景

  backgrounds.forEach(bg => {

    if (bg.img.complete) {

      ctx.drawImage(
        bg.img,
        bg.x,
        0,
        canvas.width,
        canvas.height
      );

    }

  });


  // プレイヤー

  if (playerImg.complete) {
  
    // 無敵中点滅
    if (
      player.invincible <= 0 ||
      Math.floor(player.invincible / 5) % 2 === 0
    ) {
  
      ctx.save();

      ctx.translate(
        player.x + player.w / 2,
        player.y + player.h / 2
      );
      
      ctx.rotate(player.rotation * Math.PI / 180);
      
      ctx.drawImage(
        playerImg,
        -player.w / 2,
        -player.h / 2,
        player.w,
        player.h
      );
      
      ctx.restore();
  
    }
  
  }


  // 弾

  ctx.fillStyle = "red";

  bullets.forEach(b => {

    ctx.fillRect(
      b.x,
      b.y,
      b.w,
      b.h
    );

  });


  // UI

  ctx.fillStyle = "white";
  ctx.font = "24px sans-serif";

  ctx.fillText(
    "Score: " + Math.floor(score / 10),
    20,
    35
  );

  ctx.fillText(
    "Damage: " + player.damage + " / 3",
    20,
    70
  );


  // ゲームオーバー

  if (gameOver) {

    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    ctx.fillStyle = "white";
    ctx.font = "48px sans-serif";

    ctx.fillText(
      "GAME OVER",
      240,
      220
    );

    ctx.font = "24px sans-serif";

    ctx.fillText(
      "Press Enter",
      300,
      270
    );

  }

}


// ====================
// メインループ
// ====================

function loop() {

  update();
  draw();

  requestAnimationFrame(loop);

}

loop();

</script>
</body>
</html>
