<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>横スクロール弾避け</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

canvas {
  border: 2px solid white;
  background: black;
}
</style>
</head>

<body>

<canvas id="game" width="800" height="450"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");


// ====================
// 背景画像
// ====================

const bg1 = new Image();
const bg2 = new Image();

bg1.src = "background1.png";
bg2.src = "background2.png";

const backgrounds = [
  { img: bg1, x: 0 },
  { img: bg2, x: canvas.width }
];

const bgSpeed = 2;


// ====================
// プレイヤー
// ====================

const playerImg = new Image();
playerImg.src = "player.png";

const player = {
  x: 100,
  y: 200,
  w: 120,
  h: 120,

  speed: 5,
  normalSpeed: 5,
  boostSpeed: 10,

  damage: 0,
  invincible: 0,

  spin: false,
  spinTimer: 0,
  rotation: 0
};

// ====================
// 超電磁杭
// ====================

const stakeImg = new Image();
stakeImg.src = "stake.png";


// ====================
// ゲーム変数
// ====================

let bullets = [];
let keys = {};
let score = 0;
let gameOver = false;
let frame = 0;
let trailPoints = [];
let parryCount = 0;
let parryFlash = 0;
let stakes = [];

const MAX_PARRY = 3;

// ====================
// 入力
// ====================

document.addEventListener("keydown", e => {

  keys[e.key] = true;

  if (
    e.code === "Space" &&
    !e.repeat &&
    !player.spin &&
    !gameOver
  ) {
  
    player.spin = true;
    player.spinTimer = 0;
  
    player.speed = player.boostSpeed;
  
  }

  if (
    e.code === "KeyX" &&
    !gameOver &&
    parryCount >= MAX_PARRY
  ) {
  
    fireStake();
  
    parryCount = 0;
  }

  if (gameOver && e.key === "Enter") {
    resetGame();
  }

});
document.addEventListener("keyup", e => {
  keys[e.key] = false;
});


// ====================
// リセット
// ====================

function resetGame() {
  player.x = 100;
  player.y = 200;
  player.damage = 0;
  player.invincible = 0;

  player.spin = false;
  player.spinTimer = 0;
  player.rotation = 0;
  player.speed = player.normalSpeed;

  bullets = [];
  stakes = [];
  trailPoints = [];

  backgrounds[0].x = 0;
  backgrounds[1].x = canvas.width;

  score = 0;
  frame = 0;
  parryCount = 0;
  parryFlash = 0;
  gameOver = false;
}


// ====================
// 弾生成
// ====================

function spawnBullet() {

  bullets.push({
    x: canvas.width,
    y: Math.random() * (canvas.height - 20),
    w: 20,
    h: 20,
    speed: 6
  });

}

// ====================
// 超電磁杭生成
// ====================

function fireStake() {

  stakes.push({
    x: player.x + player.w - 20,
    y: player.y + player.h / 2 - 10,
    w: 160,
    h: 20,
    speed: 14
  });

}

// ====================
// 当たり判定
// ====================

function hit(a, b) {

  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );

}


// ====================
// 更新
// ====================

function update() {

  if (gameOver) return;

  frame++;

  // スピン中処理
  if (player.spin) {
  
    player.spinTimer++;
  
    const spinTotal = 30;
    const overshootEnd = 22;
  
    if (player.spinTimer <= overshootEnd) {
      // 0 → 390度まで右回転
      const t = player.spinTimer / overshootEnd;
      player.rotation = 390 * t;
    } else {
      // 390 → 360度へ少し戻る
      const t = (player.spinTimer - overshootEnd) / (spinTotal - overshootEnd);
      player.rotation = 390 - 30 * t;
    }
  
    if (player.spinTimer >= spinTotal) {
      player.spin = false;
      player.spinTimer = 0;
      player.rotation = 0;
      player.speed = player.normalSpeed;
    }
  
  }

  // プレイヤー移動

  if (keys["ArrowUp"]) player.y -= player.speed;
  if (keys["ArrowDown"]) player.y += player.speed;
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;

  // 画面外制限
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));
  
  // 軌跡も左へ流す
  trailPoints.forEach(p => {
    p.x -= bgSpeed * 2;
  });
  
  // 回転込みで、ボード下あたりの位置を計算
  const rad = player.rotation * Math.PI / 180;
  
  const centerX = player.x + player.w / 2;
  const centerY = player.y + player.h / 2;
  
  const localX = -player.w * 0.15;
  const localY = player.h * 0.35;
  
  const trailX = centerX + localX * Math.cos(rad) - localY * Math.sin(rad);
  const trailY = centerY + localX * Math.sin(rad) + localY * Math.cos(rad);
  
  // 軌跡を記録
  trailPoints.push({
    x: trailX,
    y: trailY
  });
  
  if (trailPoints.length > 25) {
    trailPoints.shift();
  }

  // 背景スクロール

  backgrounds.forEach(bg => {
    bg.x -= bgSpeed;
  });

  backgrounds.forEach(bg => {

    if (bg.x <= -canvas.width) {

      let maxX = Math.max(...backgrounds.map(b => b.x));

      bg.x = maxX + canvas.width;
    }

  });


  // スコア

  score += 1;

  // 難易度上昇
  let difficulty = Math.floor(score / 600);
  
  // 弾の発生間隔。数字が小さいほど多く出る
  let bulletInterval = Math.max(15, 45 - difficulty * 3);
  
  // 一度に出る弾の数
  let bulletCount = 1 + Math.floor(difficulty / 4);
  
  // 弾生成
  if (frame % bulletInterval === 0) {
    for (let i = 0; i < bulletCount; i++) {
      spawnBullet();
    }
  }


  // 弾移動

  bullets.forEach(b => {
    b.x -= b.speed;
  });

  bullets = bullets.filter(b => b.x + b.w > 0);

  // 超電磁杭移動
  stakes.forEach(s => {
    s.x += s.speed;
  });

  stakes = stakes.filter(s => s.x < canvas.width);

  // 超電磁杭弾消し処理
  stakes.forEach(s => {

    bullets = bullets.filter(b => {
      return !hit(s, b);
    });
  
  });

  // 無敵時間

  if (player.invincible > 0) {
    player.invincible--;
  }


  // 当たり判定

  bullets.forEach((b, i) => {
  
    if (!hit(player, b)) return;
  
    // スピン中ならパリィ
    if (player.spin) {
      bullets.splice(i, 1);
      parryCount = Math.min(
        parryCount + 1,
        MAX_PARRY
      );

      parryFlash = 12;

      return;
    }
  
    // 通常時なら被弾
    if (player.invincible <= 0) {
  
      bullets.splice(i, 1);
  
      player.damage++;
      player.invincible = 60;
  
      if (player.damage >= 3) {
        gameOver = true;
      }
    }
  
  });

  // パリィエフェクト減衰
  if (parryFlash > 0) {
    parryFlash--;
  }

}

// ====================
// 滑走エフェクト
// ====================
  
function drawTrailEffect() {

  if (trailPoints.length < 2) return;


  let forwardPower = 1.0;

  if (keys["ArrowLeft"]) {
    forwardPower = 0.45;
  }

  if (keys["ArrowRight"]) {
    forwardPower = 1.25;
  }

  if (player.spin) {
    forwardPower = 1.8;
  }

  const speedPower = forwardPower;

  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  for (let i = 1; i < trailPoints.length; i++) {

    // 全部描かず、断続的に光らせる
    if (Math.random() < 0.35) continue;

    const p1 = trailPoints[i - 1];
    const p2 = trailPoints[i];

    const alpha = i / trailPoints.length * 0.9;

    const jitterX = 30 * speedPower;
    const jitterY = 24 * speedPower;

    const midX = (p1.x + p2.x) / 2 + (Math.random() - 0.5) *   jitterX;
    const midY = (p1.y + p2.y) / 2 + (Math.random() - 0.5) *   jitterY;

    // 外側の青い発光
    ctx.shadowBlur = 30 * speedPower;
    ctx.shadowColor = "rgba(60,180,255,1)";
    ctx.strokeStyle = `rgba(40,140,255,${alpha * 0.35})`;
    ctx.lineWidth = 10 * speedPower;

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(midX, midY);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    // 中心の白い雷芯
    ctx.shadowBlur = 8 * speedPower;
    ctx.strokeStyle = `rgba(245,255,255,${alpha})`;
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(midX, midY);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    // 枝雷
    if (Math.random() < 0.18 * speedPower) {

      const branchLen = (4 + Math.random() * 10) * speedPower;
      const branchDir = Math.random() < 0.5 ? -1 : 1;

      ctx.shadowBlur = 12 * speedPower;
      ctx.strokeStyle = `rgba(150,230,255,${alpha * 0.8})`;
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.moveTo(midX, midY);
      ctx.lineTo(
        midX - branchLen,
        midY + branchDir * branchLen
      );
      ctx.stroke();
    }
  }

  // ボード直後の破裂スパーク
  const last = trailPoints[trailPoints.length - 1];

  if (last && Math.random() < 0.65 * speedPower) {

    const sparkCount = Math.floor(3 * speedPower);

    for (let i = 0; i < sparkCount; i++) {

      const angle = Math.PI + (Math.random() - 0.5) * 1.5;
      const len = (12 + Math.random() * 30) * speedPower;

      ctx.shadowBlur = 14 * speedPower;
      ctx.shadowColor = "rgba(80,190,255,1)";
      ctx.strokeStyle = "rgba(230,255,255,0.85)";
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(
        last.x + Math.cos(angle) * len,
        last.y + Math.sin(angle) * len
      );
      ctx.stroke();
    }
  }

  ctx.restore();
}


// ====================
// 描画
// ====================

function draw() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);


  // 背景

  backgrounds.forEach(bg => {

    if (bg.img.complete) {

      ctx.drawImage(
        bg.img,
        bg.x,
        0,
        canvas.width,
        canvas.height
      );

    }

  });

  // 背景のあと、プレイヤーの前
  // 滑走線
  drawTrailEffect();

  // パリィ発光
  if (parryFlash > 0) {
  
    const alpha = parryFlash / 12;
  
    ctx.save();
  
    ctx.globalCompositeOperation = "lighter";
  
    ctx.fillStyle =
      `rgba(120,220,255,${alpha * 0.5})`;
  
    ctx.beginPath();
  
    ctx.arc(
      player.x + player.w / 2,
      player.y + player.h / 2,
      80,
      0,
      Math.PI * 2
    );
  
    ctx.fill();
  
    ctx.restore();
  }

  // プレイヤー

  if (playerImg.complete) {
  
    // 無敵中点滅
    if (
      player.invincible <= 0 ||
      Math.floor(player.invincible / 5) % 2 === 0
    ) {
  
      ctx.save();

      ctx.translate(
        player.x + player.w / 2,
        player.y + player.h / 2
      );
      
      ctx.rotate(player.rotation * Math.PI / 180);
      
      ctx.drawImage(
        playerImg,
        -player.w / 2,
        -player.h / 2,
        player.w,
        player.h
      );
      
      ctx.restore();
  
    }
  
  }


  // 弾

  ctx.fillStyle = "red";

  bullets.forEach(b => {

    ctx.fillRect(
      b.x,
      b.y,
      b.w,
      b.h
    );

  });

  // 超電磁杭
  stakes.forEach(s => {
  
    if (stakeImg.complete) {
      ctx.drawImage(
        stakeImg,
        s.x,
        s.y,
        s.w,
        s.h
      );
    } else {
      ctx.fillStyle = "cyan";
      ctx.fillRect(s.x, s.y, s.w, s.h);
    }
  
  });


  // UI

  ctx.fillStyle = "white";
  ctx.font = "24px sans-serif";

  ctx.fillText(
    "Score: " + Math.floor(score / 10),
    20,
    35
  );

  ctx.fillText(
    "Damage: " + player.damage + " / 3",
    20,
    70
  );

  // パリィゲージ
  ctx.fillStyle =
    parryCount >= MAX_PARRY
      ? "cyan"
      : "white";
  
  ctx.fillText(
    `Parry: ${parryCount} / ${MAX_PARRY}`,
    20,
    105
  );

  // 必殺技使用可能表示
  if (parryCount >= MAX_PARRY) {
  
    ctx.fillStyle = "cyan";
    ctx.font = "20px sans-serif";
  
    ctx.fillText(
      "RAIL STAKE READY",
      20,
      135
    );
  }

  // ゲームオーバー

  if (gameOver) {

    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    ctx.fillStyle = "white";
    ctx.font = "48px sans-serif";

    ctx.fillText(
      "GAME OVER",
      240,
      220
    );

    ctx.font = "24px sans-serif";

    ctx.fillText(
      "Press Enter",
      300,
      270
    );

  }

}


// ====================
// メインループ
// ====================

function loop() {

  update();
  draw();

  requestAnimationFrame(loop);

}

loop();

</script>
</body>
</html>
