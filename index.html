<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>横スクロール弾避け</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
}

.game-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
}

canvas {
  border: 2px solid white;
  background: black;
  cursor: default;
}
</style>
</head>

<body>

<div class="game-wrap">
  <canvas id="debug-ui" width="130" height="28"></canvas>
  <canvas id="game" width="800" height="450"></canvas>
  <canvas id="dialogue-ui" width="800" height="120"></canvas>
</div>

<script>

const debugCanvas = document.getElementById("debug-ui");
const debugCtx = debugCanvas.getContext("2d");
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const dialogueCanvas = document.getElementById("dialogue-ui");
const dialogueCtx = dialogueCanvas.getContext("2d");
const storyMaskCanvas = document.createElement("canvas");
const storyMaskCtx = storyMaskCanvas.getContext("2d");


// ====================
// 背景画像
// ====================

const bg1 = new Image();
const bg2 = new Image();
const titleBgImg = new Image();

bg1.src = "background1.png";
bg2.src = "background2.png";
titleBgImg.src = "title.png";

const storyImages = {
  tachikage: {
    normal: new Image(),
    laugh: new Image()
  },
  sherry: {
    normal: new Image(),
    laugh: new Image()
  }
};

storyImages.tachikage.normal.src = "tachikage_normal.png";
storyImages.tachikage.laugh.src = "tachikage_laugh.png";
storyImages.sherry.normal.src = "sherry_normal.png";
storyImages.sherry.laugh.src = "sherry_laugh.png";

const backgrounds = [
  { img: bg1, x: 0 },
  { img: bg2, x: canvas.width }
];

const bgSpeed = 2;


// ====================
// プレイヤー
// ====================

const playerImg = new Image();
playerImg.src = "player.png";

const playerRailstakeReadyImg = new Image();
playerRailstakeReadyImg.src = "player_railstake_ready.png";

const playerRailstakeThrowImg = new Image();
playerRailstakeThrowImg.src = "player_railstake_throw.png";

const player = {
  x: 100,
  y: 200,
  w: 120,
  h: 120,

  speed: 5,
  normalSpeed: 5,
  boostSpeed: 10,

  damage: 0,
  invincible: 0,

  spin: false,
  spinTimer: 0,
  rotation: 0,

  special: false,
  specialPhase: "none",
  specialTimer: 0,
  stakeFired: false
};

// ====================
// 超電磁杭
// ====================

const stakeImg = new Image();
stakeImg.src = "stake.png";

function imageReady(img) {
  return img.complete && img.naturalWidth > 0;
}

// ====================
// 敵弾
// ====================

const bulletImg = new Image();
bulletImg.src = "bullet.png";

// ====================
// ゲーム変数
// ====================

let bullets = [];
let keys = {};
let score = 0;
let gameOver = false;
let gameState = "title";
let frame = 0;
let trailPoints = [];
let parryCount = 0;
let parryFlash = 0;
let stakes = [];
let titleMenuIndex = 0;
let storyLineIndex = 0;

const MAX_PARRY = 3;
const SPECIAL_READY_FRAMES = 12;
const SPECIAL_THROW_FRAMES = 14;
const STAKE_MUZZLE_FLASH_FRAMES = 5;
let showHitBoxes = false;

const HITBOX_TOGGLE = {
  x: 0,
  y: 0,
  w: 130,
  h: 28
};

const TITLE_MENU_ITEMS = [
  "START",
  "STORY",
  "HOW TO PLAY",
  "CONFIG",
  "CREDITS"
];

const STORY_LINES = [
  {
    speaker: "Tachikage",
    character: "tachikage",
    face: "normal",
    text: "テスト文章その1"
  },
  {
    speaker: "Sherry",
    character: "sherry",
    face: "normal",
    text: "テスト文章その2"
  }
];

// ====================
// 入力
// ====================

document.addEventListener("keydown", e => {

  keys[e.key] = true;

  if (gameState === "title") {

    if (e.code === "ArrowUp") {
      titleMenuIndex =
        (titleMenuIndex + TITLE_MENU_ITEMS.length - 1) %
        TITLE_MENU_ITEMS.length;
    }

    if (e.code === "ArrowDown") {
      titleMenuIndex =
        (titleMenuIndex + 1) %
        TITLE_MENU_ITEMS.length;
    }

    if (e.key === "Enter") {
      const selectedMenu = TITLE_MENU_ITEMS[titleMenuIndex];

      if (selectedMenu === "START") {
        resetGame();
        gameState = "playing";
      }

      if (selectedMenu === "STORY") {
        storyLineIndex = 0;
        gameState = "story";
      }
    }

    return;
  }

  if (gameState === "story") {

    if (e.key === "Escape") {
      gameState = "title";
    }

    if (e.key === "Enter") {

      if (storyLineIndex < STORY_LINES.length - 1) {
        storyLineIndex++;
      } else {
        gameState = "title";
      }
    }

    return;
  }

  if (
    e.code === "Space" &&
    !e.repeat &&
    !player.spin &&
    !gameOver
  ) {
  
    player.spin = true;
    player.spinTimer = 0;
  
    player.speed = player.boostSpeed;
  
  }

  if (
    e.code === "KeyX" &&
    !gameOver &&
    parryCount >= MAX_PARRY
  ) {
  
    startSpecial();
  }

  if (gameOver && e.key === "Enter") {
    resetGame();
    gameState = "playing";
  }

});
document.addEventListener("keyup", e => {
  keys[e.key] = false;
});

debugCanvas.addEventListener("click", e => {

  const rect = debugCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * debugCanvas.width / rect.width;
  const y = (e.clientY - rect.top) * debugCanvas.height / rect.height;

  if (
    x >= HITBOX_TOGGLE.x &&
    x <= HITBOX_TOGGLE.x + HITBOX_TOGGLE.w &&
    y >= HITBOX_TOGGLE.y &&
    y <= HITBOX_TOGGLE.y + HITBOX_TOGGLE.h
  ) {
    showHitBoxes = !showHitBoxes;
    drawDebugUI();
  }
});


// ====================
// リセット
// ====================

function resetGame() {
  player.x = 100;
  player.y = 200;
  player.damage = 0;
  player.invincible = 0;

  player.spin = false;
  player.spinTimer = 0;
  player.rotation = 0;
  player.speed = player.normalSpeed;
  player.special = false;
  player.specialPhase = "none";
  player.specialTimer = 0;
  player.stakeFired = false;

  bullets = [];
  stakes = [];
  trailPoints = [];

  backgrounds[0].x = 0;
  backgrounds[1].x = canvas.width;

  score = 0;
  frame = 0;
  parryCount = 0;
  parryFlash = 0;
  gameOver = false;
}


// ====================
// 弾生成
// ====================

function spawnBullet() {

  bullets.push({
    x: canvas.width,
    y: Math.random() * (canvas.height - 42),
    w: 48,
    h: 42,
    speed: 6
  });

}

// ====================
// 超電磁杭生成
// ====================

function fireStake() {

  const muzzleX = player.x + player.w - 20;
  const muzzleY = player.y + player.h / 2;

  stakes.push({
    x: muzzleX,
    y: muzzleY - 10,
    w: 160,
    h: 20,
    speed: 14,
    age: 0,
    muzzleX,
    muzzleY
  });

}

function startSpecial() {

  player.special = true;
  player.specialPhase = "ready";
  player.specialTimer = 0;
  player.stakeFired = false;

  parryCount = 0;
}

function updateSpecial() {

  if (!player.special) return;

  player.specialTimer++;

  if (
    player.specialPhase === "ready" &&
    player.specialTimer >= SPECIAL_READY_FRAMES
  ) {
    player.specialPhase = "fire";
    player.specialTimer = 0;
  }

  if (player.specialPhase === "fire") {

    if (!player.stakeFired) {
      fireStake();
      player.stakeFired = true;
    }

    player.specialPhase = "throw";
    player.specialTimer = 0;
  }

  if (
    player.specialPhase === "throw" &&
    player.specialTimer >= SPECIAL_THROW_FRAMES
  ) {
    player.special = false;
    player.specialPhase = "none";
    player.specialTimer = 0;
    player.stakeFired = false;
  }
}

// ====================
// 当たり判定
// ====================

function hit(a, b) {

  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );

}

function stakeEffectTriangle(s) {

  const trailLength = 145;
  const effectRadius = 36;
  const tipX = s.x + s.w;
  const centerY = s.y + s.h / 2;

  return {
    a: {
      x: tipX - trailLength,
      y: centerY - effectRadius
    },
    b: {
      x: tipX - trailLength,
      y: centerY + effectRadius
    },
    c: {
      x: tipX,
      y: centerY
    }
  };
}

function pointInTriangle(p, a, b, c) {

  const d1 =
    (p.x - b.x) * (a.y - b.y) -
    (a.x - b.x) * (p.y - b.y);
  const d2 =
    (p.x - c.x) * (b.y - c.y) -
    (b.x - c.x) * (p.y - c.y);
  const d3 =
    (p.x - a.x) * (c.y - a.y) -
    (c.x - a.x) * (p.y - a.y);

  const hasNegative = d1 < 0 || d2 < 0 || d3 < 0;
  const hasPositive = d1 > 0 || d2 > 0 || d3 > 0;

  return !(hasNegative && hasPositive);
}

function hitTriangleWithRect(triangle, rect) {

  const points = [
    {
      x: rect.x + rect.w / 2,
      y: rect.y + rect.h / 2
    },
    {
      x: rect.x,
      y: rect.y
    },
    {
      x: rect.x + rect.w,
      y: rect.y
    },
    {
      x: rect.x,
      y: rect.y + rect.h
    },
    {
      x: rect.x + rect.w,
      y: rect.y + rect.h
    }
  ];

  return points.some(p =>
    pointInTriangle(p, triangle.a, triangle.b, triangle.c)
  );
}



// ====================
// プレイヤー更新
// ====================

function updatePlayer() {

  // スピン中処理
  if (player.spin) {

    player.spinTimer++;

    const spinTotal = 30;
    const overshootEnd = 22;

    if (player.spinTimer <= overshootEnd) {
      // 0 → 390度まで右回転
      const t = player.spinTimer / overshootEnd;
      player.rotation = 390 * t;
    } else {
      // 390 → 360度へ少し戻る
      const t = (player.spinTimer - overshootEnd) / (spinTotal - overshootEnd);
      player.rotation = 390 - 30 * t;
    }

    if (player.spinTimer >= spinTotal) {
      player.spin = false;
      player.spinTimer = 0;
      player.rotation = 0;
      player.speed = player.normalSpeed;
    }
  }

  // プレイヤー移動
  if (keys["ArrowUp"]) player.y -= player.speed;
  if (keys["ArrowDown"]) player.y += player.speed;
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;

  // 画面外制限
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

  // 軌跡も左へ流す
  trailPoints.forEach(p => {
    p.x -= bgSpeed * 2;
  });

  // 回転込みで、ボード下あたりの位置を計算
  const rad = player.rotation * Math.PI / 180;

  const centerX = player.x + player.w / 2;
  const centerY = player.y + player.h / 2;

  const localX = -player.w * 0.15;
  const localY = player.h * 0.35;

  const trailX = centerX + localX * Math.cos(rad) - localY * Math.sin(rad);
  const trailY = centerY + localX * Math.sin(rad) + localY * Math.cos(rad);

  // 軌跡を記録
  trailPoints.push({
    x: trailX,
    y: trailY
  });

  if (trailPoints.length > 25) {
    trailPoints.shift();
  }
}

// ====================
// 背景更新
// ====================

function updateBackground() {

  backgrounds.forEach(bg => {
    bg.x -= bgSpeed;
  });

  backgrounds.forEach(bg => {

    if (bg.x <= -canvas.width) {

      let maxX = Math.max(...backgrounds.map(b => b.x));

      bg.x = maxX + canvas.width;
    }

  });

}

// ====================
// 弾生成更新
// ====================

function updateBulletSpawner(difficulty) {

  // 弾の発生間隔、数字が小さいほど多く出る
  const bulletInterval =
    Math.max(15, 45 - difficulty * 3);

  // 一度に出る弾数
  const bulletCount =
    1 + Math.floor(difficulty / 4);

  // 弾生成
  if (frame % bulletInterval === 0) {

    for (let i = 0; i < bulletCount; i++) {
      spawnBullet();
    }

  }

}

// ====================
// 超電磁杭更新
// ====================

function updateStake() {

  // 超電磁杭移動
  stakes.forEach(s => {
    s.x += s.speed;
    s.age++;
  });

  // 画面外削除
  stakes = stakes.filter(
    s => s.x < canvas.width + s.w
  );

  // 超電磁杭弾消し処理
  stakes.forEach(s => {

    const effectTriangle = stakeEffectTriangle(s);

    bullets = bullets.filter(b => {
      return !hit(s, b) && !hitTriangleWithRect(effectTriangle, b);
    });

  });

}

// ====================
// 弾更新
// ====================

function updateBullets() {

  // 弾移動
  bullets.forEach(b => {
    b.x -= b.speed;
  });

  // 画面外削除
  bullets = bullets.filter(
    b => b.x + b.w > 0
  );

  // 無敵時間
  if (player.invincible > 0) {
    player.invincible--;
  }

  // 当たり判定
  for (let i = bullets.length - 1; i >= 0; i--) {

    const b = bullets[i];

    if (!hit(player, b)) continue;

    // スピン中ならパリィ
    if (player.spin) {

      bullets.splice(i, 1);

      parryCount = Math.min(
        parryCount + 1,
        MAX_PARRY
      );

      parryFlash = 12;

      continue;
    }

    // 通常時なら被弾
    if (player.invincible <= 0) {

      bullets.splice(i, 1);

      player.damage++;
      player.invincible = 60;

      if (player.damage >= 3) {
        gameOver = true;
      }

    }

  }

}

// ====================
// エフェクト更新
// ====================

function updateEffects() {

  // パリィ発光減衰
  if (parryFlash > 0) {
    parryFlash--;
  }

}

// ====================
// 更新
// ====================

function update() {
  if (gameState === "title" || gameState === "story") return;
  if (gameOver) return;
  frame++;
  // プレイヤー動作
  updatePlayer();
  // 必殺技演出
  updateSpecial();
  // 背景スクロール
  updateBackground();
  // スコア
  score += 1;
  // 難易度上昇
  let difficulty = Math.floor(score / 600);
  // 弾生成
  updateBulletSpawner(difficulty);
  // 超電磁杭更新
  updateStake();
  // 弾更新
  updateBullets();
  // エフェクト
  updateEffects();
}

// ====================
// 背景描画
// ====================

function drawBackground() {

  backgrounds.forEach(bg => {

    if (imageReady(bg.img)) {

      ctx.drawImage(
        bg.img,
        bg.x,
        0,
        canvas.width,
        canvas.height
      );

    }

  });

}

function drawCoverImage(img) {

  if (!imageReady(img)) return;

  const imageRatio = img.naturalWidth / img.naturalHeight;
  const canvasRatio = canvas.width / canvas.height;

  let sx = 0;
  let sy = 0;
  let sw = img.naturalWidth;
  let sh = img.naturalHeight;

  if (imageRatio > canvasRatio) {
    sw = img.naturalHeight * canvasRatio;
    sx = (img.naturalWidth - sw) / 2;
  } else {
    sh = img.naturalWidth / canvasRatio;
    sy = (img.naturalHeight - sh) / 2;
  }

  ctx.drawImage(
    img,
    sx,
    sy,
    sw,
    sh,
    0,
    0,
    canvas.width,
    canvas.height
  );
}

// ====================
// 滑走エフェクト
// ====================
  
function drawTrailEffect() {

  if (trailPoints.length < 2) return;


  let forwardPower = 1.0;

  if (keys["ArrowLeft"]) {
    forwardPower = 0.45;
  }

  if (keys["ArrowRight"]) {
    forwardPower = 1.25;
  }

  if (player.spin) {
    forwardPower = 1.8;
  }

  const speedPower = forwardPower;

  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  for (let i = 1; i < trailPoints.length; i++) {

    // 全部描かず、断続的に光らせる
    if (Math.random() < 0.35) continue;

    const p1 = trailPoints[i - 1];
    const p2 = trailPoints[i];

    const alpha = i / trailPoints.length * 0.9;

    const jitterX = 30 * speedPower;
    const jitterY = 24 * speedPower;

    const midX = (p1.x + p2.x) / 2 + (Math.random() - 0.5) *   jitterX;
    const midY = (p1.y + p2.y) / 2 + (Math.random() - 0.5) *   jitterY;

    // 外側の青い発光
    ctx.shadowBlur = 30 * speedPower;
    ctx.shadowColor = "rgba(60,180,255,1)";
    ctx.strokeStyle = `rgba(40,140,255,${alpha * 0.35})`;
    ctx.lineWidth = 10 * speedPower;

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(midX, midY);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    // 中心の白い雷芯
    ctx.shadowBlur = 8 * speedPower;
    ctx.strokeStyle = `rgba(245,255,255,${alpha})`;
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(midX, midY);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    // 枝雷
    if (Math.random() < 0.18 * speedPower) {

      const branchLen = (4 + Math.random() * 10) * speedPower;
      const branchDir = Math.random() < 0.5 ? -1 : 1;

      ctx.shadowBlur = 12 * speedPower;
      ctx.strokeStyle = `rgba(150,230,255,${alpha * 0.8})`;
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.moveTo(midX, midY);
      ctx.lineTo(
        midX - branchLen,
        midY + branchDir * branchLen
      );
      ctx.stroke();
    }
  }

  // ボード直後の破裂スパーク
  const last = trailPoints[trailPoints.length - 1];

  if (last && Math.random() < 0.65 * speedPower) {

    const sparkCount = Math.floor(3 * speedPower);

    for (let i = 0; i < sparkCount; i++) {

      const angle = Math.PI + (Math.random() - 0.5) * 1.5;
      const len = (12 + Math.random() * 30) * speedPower;

      ctx.shadowBlur = 14 * speedPower;
      ctx.shadowColor = "rgba(80,190,255,1)";
      ctx.strokeStyle = "rgba(230,255,255,0.85)";
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(
        last.x + Math.cos(angle) * len,
        last.y + Math.sin(angle) * len
      );
      ctx.stroke();
    }
  }

  ctx.restore();
}

// ====================
// パリィ発光
// ====================

function drawParryFlash() {

  if (parryFlash <= 0) return;

  const alpha = parryFlash / 12;

  ctx.save();

  ctx.globalCompositeOperation = "lighter";

  ctx.fillStyle =
    `rgba(120,220,255,${alpha * 0.5})`;

  ctx.beginPath();

  ctx.arc(
    player.x + player.w / 2,
    player.y + player.h / 2,
    80,
    0,
    Math.PI * 2
  );

  ctx.fill();

  ctx.restore();

}


// ====================
// エフェクト描画
// ====================

function drawEffects() {
  // 滑走エフェクト
  drawTrailEffect();
  // パリィ発光
  drawParryFlash();

}

// ====================
// プレイヤー描画
// ====================

function drawPlayer() {

  let currentPlayerImg = playerImg;
  let drawScale = 1;
  let drawOffsetY = 0;

  if (player.specialPhase === "ready") {
    currentPlayerImg = playerRailstakeReadyImg;
    drawScale = 1.14;
    drawOffsetY = -12;
  }

  if (player.specialPhase === "throw") {
    currentPlayerImg = playerRailstakeThrowImg;
  }

  if (!imageReady(currentPlayerImg)) return;

  // 無敵中点滅
  if (
    player.invincible > 0 &&
    Math.floor(player.invincible / 5) % 2 !== 0
  ) {
    return;
  }

  ctx.save();

  ctx.translate(
    player.x + player.w / 2,
    player.y + player.h / 2
  );

  ctx.rotate(
    player.rotation * Math.PI / 180
  );

  const drawW = player.w * drawScale;
  const drawH = player.h * drawScale;

  ctx.drawImage(
    currentPlayerImg,
    -drawW / 2,
    -drawH / 2 + drawOffsetY,
    drawW,
    drawH
  );

  ctx.restore();

}

// ====================
// 弾描画
// ====================

function drawBullets() {

  bullets.forEach(b => {

    // 残像
    ctx.save();

    ctx.globalAlpha = 0.25;

    if (imageReady(bulletImg)) {

      ctx.drawImage(
        bulletImg,
        b.x + 14,
        b.y,
        b.w,
        b.h
      );

      ctx.globalAlpha = 0.12;

      ctx.drawImage(
        bulletImg,
        b.x + 28,
        b.y,
        b.w,
        b.h
      );

    }

    ctx.restore();

    // 本体
    if (imageReady(bulletImg)) {

      ctx.drawImage(
        bulletImg,
        b.x,
        b.y,
        b.w,
        b.h
      );

    } else {

      ctx.fillStyle = "red";

      ctx.fillRect(
        b.x,
        b.y,
        b.w,
        b.h
      );

    }

  });

}

// ====================
// 超電磁杭描画
// ====================

function drawStakeHelix(s, front) {

  const tipX = s.x + s.w;
  const centerY = s.y + s.h / 2;
  const trailLength = 145;
  const startRadius = 4;
  const endRadius = 36;
  const turns = 0.95;
  const steps = 16;
  const phase = s.age * 0.65;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  [0, Math.PI].forEach(offset => {

    const points = [];

    for (let i = 0; i <= steps; i++) {

      const t = i / steps;
      const angle = t * Math.PI * 2 * turns + phase + offset;
      const radius = startRadius + (endRadius - startRadius) * t;
      const jitterX = (Math.random() - 0.5) * 10 * t;
      const jitterY = (Math.random() - 0.5) * 18 * t;

      points.push({
        x: tipX - trailLength * t + jitterX,
        y: centerY + Math.sin(angle) * radius + jitterY,
        front: Math.cos(angle) >= 0
      });
    }

    ctx.shadowBlur = front ? 24 : 10;
    ctx.shadowColor = "rgba(80,190,255,1)";
    ctx.strokeStyle = front
      ? "rgba(60,180,255,0.52)"
      : "rgba(30,110,220,0.22)";
    ctx.lineWidth = front ? 6 : 3;

    for (let i = 1; i < points.length; i++) {

      if (points[i].front !== front) continue;

      ctx.beginPath();
      ctx.moveTo(points[i - 1].x, points[i - 1].y);
      ctx.lineTo(points[i].x, points[i].y);
      ctx.stroke();
    }

    ctx.shadowBlur = front ? 8 : 0;
    ctx.strokeStyle = front
      ? "rgba(245,255,255,0.9)"
      : "rgba(130,210,255,0.28)";
    ctx.lineWidth = front ? 2 : 1;

    for (let i = 1; i < points.length; i++) {

      if (points[i].front !== front) continue;

      ctx.beginPath();
      ctx.moveTo(points[i - 1].x, points[i - 1].y);
      ctx.lineTo(points[i].x, points[i].y);
      ctx.stroke();
    }
  });

  ctx.restore();
}

function drawStakeSparks(s) {

  const centerY = s.y + s.h / 2;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.lineCap = "round";

  const sparkCount = 4;

  for (let i = 0; i < sparkCount; i++) {

    if (Math.random() < 0.35) continue;

    const baseX = s.x + Math.random() * s.w;
    const baseY = centerY + (Math.random() < 0.5 ? -1 : 1) * (s.h / 2 + 4);
    const dir = baseY < centerY ? -1 : 1;
    const len = 10 + Math.random() * 18;
    const angle = -Math.PI + (Math.random() - 0.5) * 0.9 + dir * 0.65;

    ctx.shadowBlur = 14;
    ctx.shadowColor = "rgba(80,190,255,1)";
    ctx.strokeStyle = "rgba(230,255,255,0.8)";
    ctx.lineWidth = 1.5;

    ctx.beginPath();
    ctx.moveTo(baseX, baseY);
    ctx.lineTo(
      baseX + Math.cos(angle) * len,
      baseY + Math.sin(angle) * len
    );
    ctx.stroke();
  }

  ctx.restore();
}

function drawStakeMuzzleFlash(s) {

  if (s.age > STAKE_MUZZLE_FLASH_FRAMES) return;

  const alpha = 1 - s.age / STAKE_MUZZLE_FLASH_FRAMES;
  const flashX = s.muzzleX;
  const flashY = s.muzzleY;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";

  const gradient = ctx.createRadialGradient(
    flashX,
    flashY,
    4,
    flashX,
    flashY,
    70
  );

  gradient.addColorStop(0, `rgba(245,255,255,${alpha * 0.95})`);
  gradient.addColorStop(0.35, `rgba(80,210,255,${alpha * 0.45})`);
  gradient.addColorStop(1, "rgba(40,120,255,0)");

  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(flashX, flashY, 70, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 26;
  ctx.shadowColor = "rgba(80,190,255,1)";
  ctx.strokeStyle = `rgba(230,255,255,${alpha * 0.85})`;
  ctx.lineWidth = 3;
  ctx.lineCap = "round";

  for (let i = 0; i < 5; i++) {

    const angle = (Math.random() - 0.5) * 1.2;
    const len = 38 + Math.random() * 36;

    ctx.beginPath();
    ctx.moveTo(flashX, flashY);
    ctx.lineTo(
      flashX + Math.cos(angle) * len,
      flashY + Math.sin(angle) * len
    );
    ctx.stroke();
  }

  ctx.restore();
}

function drawStake() {

  stakes.forEach(s => {

    drawStakeHelix(s, false);

    if (imageReady(stakeImg)) {

      ctx.drawImage(
        stakeImg,
        s.x,
        s.y,
        s.w,
        s.h
      );

    } else {

      ctx.fillStyle = "cyan";

      ctx.fillRect(
        s.x,
        s.y,
        s.w,
        s.h
      );

    }

    drawStakeMuzzleFlash(s);
    drawStakeHelix(s, true);
    drawStakeSparks(s);

  });

}

// ====================
// 当たり判定表示
// ====================

function drawHitBox(box, color) {

  ctx.fillStyle = color.fill;
  ctx.strokeStyle = color.stroke;
  ctx.lineWidth = 2;

  ctx.fillRect(box.x, box.y, box.w, box.h);
  ctx.strokeRect(box.x, box.y, box.w, box.h);
}

function drawHitTriangle(triangle, color) {

  ctx.fillStyle = color.fill;
  ctx.strokeStyle = color.stroke;
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(triangle.a.x, triangle.a.y);
  ctx.lineTo(triangle.b.x, triangle.b.y);
  ctx.lineTo(triangle.c.x, triangle.c.y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

function drawHitBoxes() {

  if (!showHitBoxes) return;

  ctx.save();

  drawHitBox(
    player,
    {
      fill: "rgba(80,255,120,0.12)",
      stroke: "rgba(80,255,120,0.85)"
    }
  );

  bullets.forEach(b => {
    drawHitBox(
      b,
      {
        fill: "rgba(255,80,80,0.12)",
        stroke: "rgba(255,80,80,0.85)"
      }
    );
  });

  stakes.forEach(s => {
    drawHitTriangle(
      stakeEffectTriangle(s),
      {
        fill: "rgba(190,90,255,0.10)",
        stroke: "rgba(190,90,255,0.75)"
      }
    );

    drawHitBox(
      s,
      {
        fill: "rgba(80,230,255,0.14)",
        stroke: "rgba(80,230,255,0.9)"
      }
    );
  });

  ctx.restore();
}

function drawDebugUI() {

  debugCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
  debugCtx.save();

  debugCtx.fillStyle = showHitBoxes
    ? "rgba(60,220,255,0.22)"
    : "rgba(0,0,0,0.35)";
  debugCtx.strokeStyle = showHitBoxes
    ? "rgba(90,240,255,0.95)"
    : "rgba(255,255,255,0.55)";
  debugCtx.lineWidth = 2;

  debugCtx.fillRect(
    HITBOX_TOGGLE.x,
    HITBOX_TOGGLE.y,
    HITBOX_TOGGLE.w,
    HITBOX_TOGGLE.h
  );
  debugCtx.strokeRect(
    HITBOX_TOGGLE.x,
    HITBOX_TOGGLE.y,
    HITBOX_TOGGLE.w,
    HITBOX_TOGGLE.h
  );

  debugCtx.fillStyle = showHitBoxes
    ? "cyan"
    : "white";
  debugCtx.font = "14px sans-serif";
  debugCtx.textAlign = "center";
  debugCtx.textBaseline = "middle";
  debugCtx.fillText(
    `HIT BOX ${showHitBoxes ? "ON" : "OFF"}`,
    HITBOX_TOGGLE.x + HITBOX_TOGGLE.w / 2,
    HITBOX_TOGGLE.y + HITBOX_TOGGLE.h / 2
  );

  debugCtx.restore();
}

// ====================
// タイトル描画
// ====================

function drawDialogueUI(speaker, text, promptText = "Enter") {

  dialogueCtx.clearRect(
    0,
    0,
    dialogueCanvas.width,
    dialogueCanvas.height
  );

  if (!text) return;

  dialogueCtx.save();

  dialogueCtx.fillStyle = "rgba(0,0,0,0.78)";
  dialogueCtx.strokeStyle = "rgba(120,220,255,0.9)";
  dialogueCtx.lineWidth = 2;

  dialogueCtx.fillRect(
    0,
    0,
    dialogueCanvas.width,
    dialogueCanvas.height
  );
  dialogueCtx.strokeRect(
    0,
    0,
    dialogueCanvas.width,
    dialogueCanvas.height
  );

  dialogueCtx.fillStyle = "cyan";
  dialogueCtx.font = "18px sans-serif";
  dialogueCtx.textAlign = "left";
  dialogueCtx.textBaseline = "top";
  dialogueCtx.fillText(
    speaker,
    24,
    18
  );

  dialogueCtx.fillStyle = "white";
  dialogueCtx.font = "22px sans-serif";
  dialogueCtx.fillText(
    text,
    24,
    52
  );

  dialogueCtx.fillStyle = "rgba(255,255,255,0.65)";
  dialogueCtx.font = "16px sans-serif";
  dialogueCtx.textAlign = "right";
  dialogueCtx.fillText(
    promptText,
    dialogueCanvas.width - 24,
    dialogueCanvas.height - 30
  );

  dialogueCtx.restore();
}

function drawTitle() {

  if (imageReady(titleBgImg)) {
    drawCoverImage(titleBgImg);
  } else {
    drawBackground();
  }

  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";

  ctx.fillStyle = "white";
  ctx.font = "64px sans-serif";
  ctx.fillText(
    "TACHIKAGE",
    canvas.width / 2,
    140
  );

  ctx.font = "24px sans-serif";

  TITLE_MENU_ITEMS.forEach((item, i) => {

    const y = 245 + i * 42;
    const selected = i === titleMenuIndex;

    ctx.fillStyle = selected
      ? "cyan"
      : "white";

    ctx.fillText(
      `${selected ? "> " : "  "}${item}${selected ? " <" : "  "}`,
      canvas.width / 2,
      y
    );
  });

  ctx.textAlign = "left";

}

// ====================
// UI描画
// ====================

function drawStoryCharacter(img, side, active) {

  if (!imageReady(img)) return;

  const targetH = 390;
  const scale = targetH / img.naturalHeight;
  const targetW = img.naturalWidth * scale;
  const x = side === "left"
    ? 36
    : canvas.width - targetW - 36;
  const y = canvas.height - targetH;

  ctx.drawImage(
    img,
    x,
    y,
    targetW,
    targetH
  );

  if (!active) {
    storyMaskCanvas.width = targetW;
    storyMaskCanvas.height = targetH;

    storyMaskCtx.clearRect(
      0,
      0,
      targetW,
      targetH
    );
    storyMaskCtx.drawImage(
      img,
      0,
      0,
      targetW,
      targetH
    );
    storyMaskCtx.globalCompositeOperation = "source-in";
    storyMaskCtx.fillStyle = "rgba(0,0,0,0.45)";
    storyMaskCtx.fillRect(
      0,
      0,
      targetW,
      targetH
    );
    storyMaskCtx.globalCompositeOperation = "source-over";

    ctx.drawImage(
      storyMaskCanvas,
      x,
      y
    );
  }
}

function drawStory() {

  const line = STORY_LINES[storyLineIndex];
  const isLastLine = storyLineIndex === STORY_LINES.length - 1;

  drawBackground();
  ctx.fillStyle = "rgba(0,0,0,0.38)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStoryCharacter(
    storyImages.tachikage[
      line.character === "tachikage"
        ? line.face
        : "normal"
    ],
    "left",
    line.character === "tachikage"
  );

  drawStoryCharacter(
    storyImages.sherry[
      line.character === "sherry"
        ? line.face
        : "normal"
    ],
    "right",
    line.character === "sherry"
  );

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.fillStyle = "white";
  ctx.font = "40px sans-serif";
  ctx.fillText(
    "STORY",
    canvas.width / 2,
    canvas.height / 2 - 32
  );

  ctx.fillStyle = "rgba(255,255,255,0.8)";
  ctx.font = "20px sans-serif";
  ctx.fillText(
    "Press Enter or Esc to return",
    canvas.width / 2,
    canvas.height / 2 + 28
  );

  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";

  drawDialogueUI(
    line.speaker,
    line.text,
    isLastLine
      ? "Enter/Escでタイトルに戻る"
      : "Enter"
  );
}

function drawUI() {

  ctx.fillStyle = "white";
  ctx.font = "24px sans-serif";

  ctx.fillText(
    "Score: " + Math.floor(score / 10),
    20,
    35
  );

  ctx.fillText(
    "Damage: " + player.damage + " / 3",
    20,
    70
  );

  // パリィゲージ
  ctx.fillStyle =
    parryCount >= MAX_PARRY
      ? "cyan"
      : "white";

  ctx.fillText(
    `Parry: ${parryCount} / ${MAX_PARRY}`,
    20,
    105
  );

  // 必殺技使用可能表示
  if (parryCount >= MAX_PARRY) {

    ctx.fillStyle = "cyan";
    ctx.font = "20px sans-serif";

    ctx.fillText(
      "RAIL STAKE READY",
      20,
      135
    );
  }

  // ゲームオーバー
  if (gameOver) {

    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    ctx.fillStyle = "white";
    ctx.font = "48px sans-serif";

    ctx.fillText(
      "GAME OVER",
      240,
      220
    );

    ctx.font = "24px sans-serif";

    ctx.fillText(
      "Press Enter",
      300,
      270
    );
  }
}

// ====================
// 描画
// ====================

function draw() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameState === "title") {
    drawTitle();
    return;
  }

  if (gameState === "story") {
    drawStory();
    return;
  }

  // 背景
  drawBackground();

  // エフェクト
  drawEffects();  

  // プレイヤー
  drawPlayer();

  // 弾
  drawBullets();

  // 超電磁杭
  drawStake();

  drawHitBoxes();

  // 当たり判定
  drawHitBoxes();

  // UI
  drawUI();

  // 当たり判定切替

}


// ====================
// メインループ
// ====================

function loop() {

  update();
  draw();
  drawDebugUI();
  if (gameState !== "story") {
    drawDialogueUI("", "");
  }

  requestAnimationFrame(loop);

}

loop();

</script>
